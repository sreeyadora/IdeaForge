<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaForge — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060912;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: rgba(99,102,241,0.2);
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.4);
      --accent2: #a78bfa;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f85149;
      --success: #3fb950;
    }
    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.3rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 0 40px rgba(99,102,241,0.08), 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Login type toggle */
    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.8rem;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
    }
    .toggle-btn {
      padding: 0.55rem 0.5rem;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .toggle-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .toggle-btn:not(.active):hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    /* Tabs */
    .auth-tabs {
      display: none;
      gap: 0;
      margin-bottom: 1.5rem;
    }
    .auth-tabs.visible { display: flex; }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      border-bottom: 2px solid var(--border);
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    input::placeholder { color: rgba(139,148,158,0.5); }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    }
    .btn-primary:hover {
      background: #818cf8;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.5);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: #f85149;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .admin-badge {
      text-align: center;
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }
    .admin-badge p {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .admin-badge strong { color: var(--accent2); }

    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <h1>IdeaForge</h1>
      <p>// turn ideas into apps</p>
    </div>

    <div class="card">
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-user" onclick="switchMode('user')">
          👤 User Login
        </button>
        <button class="toggle-btn" id="btn-admin" onclick="switchMode('admin')">
          🛡️ Admin Login
        </button>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <!-- User section -->
      <div class="section active" id="user-section">
        <div class="auth-tabs visible" id="user-tabs">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login form -->
        <div id="form-login">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
        </div>

        <!-- Register form -->
        <div id="form-register" style="display:none">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Choose a password (min 4 chars)" />
          </div>
          <button class="btn btn-primary" onclick="doRegister()">Create Account →</button>
        </div>
      </div>

      <!-- Admin section -->
      <div class="section" id="admin-section">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="admin-email" placeholder="admin@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="admin-password" placeholder="Admin password" />
        </div>
        <button class="btn btn-primary" onclick="doAdminLogin()">Access Admin Panel →</button>
        <div class="admin-badge">
          <p>Protected area — <strong>administrators only</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentMode = 'user';
    let currentTab = 'login';

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('user-section').classList.toggle('active', mode === 'user');
      document.getElementById('admin-section').classList.toggle('active', mode === 'admin');
      document.getElementById('btn-user').classList.toggle('active', mode === 'user');
      document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
      hideError();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) { showError('Please enter username and password'); return; }
      const fd = new FormData();
      fd.append('login_type', 'user');
      fd.append('username', username);
      fd.append('password', password);
      try {
        const res = await fetch('/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/dashboard'; }
        else { showError(data.detail || 'Invalid credentials'); }
      } catch (e) { showError('Connection error. Try again.'); }
    }

    async function doRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!username || !password) { showError('Please fill all fields'); return; }
      const fd = new FormData();
      fd.append('username', username);
      fd.append('password', password);
      try {
        const res = await fetch('/auth/register', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/dashboard'; }
        else { showError(data.detail || 'Registration failed'); }
      } catch (e) { showError('Connection error. Try again.'); }
    }

    async function doAdminLogin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      if (!email || !password) { showError('Please enter admin credentials'); return; }
      const fd = new FormData();
      fd.append('login_type', 'admin');
      fd.append('username', email);
      fd.append('password', password);
      try {
        const res = await fetch('/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/admin'; }
        else { showError(data.detail || 'Invalid admin credentials'); }
      } catch (e) { showError('Connection error. Try again.'); }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (currentMode === 'admin') doAdminLogin();
      else if (currentTab === 'login') doLogin();
      else doRegister();
    });
  </script>
</body>
</html>
